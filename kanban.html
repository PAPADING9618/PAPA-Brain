<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Kanban 看板</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #667eea;
            --secondary: #764ba2;
            --accent-work: #3b82f6;
            --accent-side: #8b5cf6;
            --accent-hobby: #10b981;
            --accent-growth: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text);
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--surface);
            border: 1px solid var(--surface-light);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--surface-light);
        }

        .board {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: stretch;
            overflow-x: auto;
            min-height: calc(100vh - 200px);
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px 20px;
        }

        .column {
            background: var(--surface);
            border: 1px solid var(--surface-light);
            border-radius: 16px;
            flex: 1;
            min-width: 280px;
            max-width: 400px;
            max-height: calc(100vh - 180px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .column:hover {
            border-color: var(--primary);
        }

        .column.drag-over {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.3);
        }

        .column-header {
            padding: 20px;
            border-bottom: 1px solid var(--surface-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .column-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        .column-count {
            background: var(--surface-light);
            color: var(--text-muted);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-card {
            background: var(--surface-light);
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 16px;
            cursor: grab;
            transition: all 0.2s;
        }

        .task-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .task-card.dragging {
            opacity: 0.5;
            transform: rotate(3deg);
        }

        .task-card.high-priority {
            border-left: 4px solid #ef4444;
        }

        .task-card.medium-priority {
            border-left: 4px solid #f59e0b;
        }

        .task-card.low-priority {
            border-left: 4px solid #10b981;
        }

        .task-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .task-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag-work { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .tag-工作 { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .tag-personal { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .tag-个人 { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .tag-side { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .tag-hobby { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .tag-wedding { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .tag-xiaopa { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .tag-study { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .tag-学习 { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .tag-growth { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .tag-health { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .tag-健康 { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: var(--surface);
            color: var(--text);
        }

        .task-btn:hover {
            background: var(--primary);
            color: white;
        }

        .add-task-btn {
            margin: 15px;
            padding: 12px;
            border: 2px dashed var(--surface-light);
            border-radius: 12px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-task-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--surface-light);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal h2 {
            margin-bottom: 20px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--surface-light);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--surface);
        }

        /* 优先级选择 */
        .priority-options {
            display: flex;
            gap: 10px;
        }

        .priority-option {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--surface-light);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .priority-option:hover {
            border-color: var(--primary);
        }

        .priority-option.selected {
            border-color: var(--primary);
            background: rgba(102,126,234,0.1);
            color: var(--text);
        }

        .priority-option.high { border-left: 4px solid #ef4444; }
        .priority-option.medium { border-left: 4px solid #f59e0b; }
        .priority-option.low { border-left: 4px solid #10b981; }

        /* 标签选择 */
        .tag-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag-option {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--surface-light);
            color: var(--text-muted);
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-option:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .tag-option.selected {
            border-color: var(--primary);
            background: rgba(102,126,234,0.15);
            color: var(--text);
            box-shadow: 0 0 0 1px var(--primary);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--surface-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .task-list::-webkit-scrollbar {
            width: 6px;
        }

        .task-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: var(--surface-light);
            border-radius: 3px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            border: 1px solid var(--surface-light);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="home.html" class="back-btn">← 返回</a>
        <h1>📋 Kanban 看板</h1>
        <p>拖拽管理任务，让工作井井有条</p>
    </div>

    <div class="board">
        <!-- 待办列 -->
        <div class="column column-todo" data-status="todo">
            <div class="column-header">
                <div class="column-title">📝 待办事项</div>
                <span class="column-count">0</span>
            </div>
            <div class="task-list" id="todo-list"></div>
            <button class="add-task-btn" onclick="openModal('todo')">
                <span>+</span> 添加任务
            </button>
        </div>

        <!-- 进行中列 -->
        <div class="column column-progress" data-status="progress">
            <div class="column-header">
                <div class="column-title">🚀 进行中</div>
                <span class="column-count">0</span>
            </div>
            <div class="task-list" id="progress-list"></div>
            <button class="add-task-btn" onclick="openModal('progress')">
                <span>+</span> 添加任务
            </button>
        </div>

        <!-- 已完成列 -->
        <div class="column column-done" data-status="done">
            <div class="column-header">
                <div class="column-title">✅ 已完成</div>
                <span class="column-count">0</span>
            </div>
            <div class="task-list" id="done-list"></div>
            <button class="add-task-btn" onclick="openModal('done')">
                <span>+</span> 添加任务
            </button>
        </div>

        <!-- 已归档列 -->
        <div class="column column-archive" data-status="archive">
            <div class="column-header">
                <div class="column-title">📦 已归档</div>
                <span class="column-count">0</span>
            </div>
            <div class="task-list" id="archive-list"></div>
            <button class="add-task-btn" onclick="openModal('archive')">
                <span>+</span> 添加任务
            </button>
        </div>
    </div>

    <!-- 任务模态框 -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2 id="modalTitle">添加任务</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <input type="hidden" id="taskStatus">
                
                <div class="form-group">
                    <label>任务标题</label>
                    <input type="text" id="taskTitle" placeholder="输入任务标题..." required>
                </div>

                <div class="form-group">
                    <label>任务描述</label>
                    <textarea id="taskDesc" placeholder="添加任务描述（可选）..."></textarea>
                </div>

                <div class="form-group">
                    <label>优先级</label>
                    <div class="priority-options">
                        <div class="priority-option high" data-priority="high" onclick="selectPriority('high')">🔴 高</div>
                        <div class="priority-option medium selected" data-priority="medium" onclick="selectPriority('medium')">🟡 中</div>
                        <div class="priority-option low" data-priority="low" onclick="selectPriority('low')">🟢 低</div>
                    </div>
                    <input type="hidden" id="taskPriority" value="medium">
                </div>

                <div class="form-group">
                    <label>标签</label>
                    <div class="tag-options">
                        <div class="tag-option" data-tag="工作" onclick="toggleTag('工作')"><span>💼</span><span>工作</span></div>
                        <div class="tag-option" data-tag="个人" onclick="toggleTag('个人')"><span>🏠</span><span>个人</span></div>
                        <div class="tag-option" data-tag="学习" onclick="toggleTag('学习')"><span>📚</span><span>学习</span></div>
                        <div class="tag-option" data-tag="健康" onclick="toggleTag('健康')"><span>💪</span><span>健康</span></div>
                    </div>
                    <input type="hidden" id="taskTags" value="">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script>
        // GitHub 数据源配置
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/PAPADING9618/PAPA-Brain/main/data.json';
        
        // 任务数据存储
        let tasks = [];
        let editingTaskId = null;
        
        // 从 GitHub 加载数据
        async function loadFromGitHub() {
            try {
                const response = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                
                if (data.tasks && data.tasks.length > 0) {
                    tasks = data.tasks;
                    console.log('✅ 已从 GitHub 加载数据');
                    
                    localStorage.setItem('kanban-tasks-cache', JSON.stringify(tasks));
                    localStorage.setItem('kanban-last-sync', new Date().toISOString());
                    
                    renderBoard();
                    const date = new Date();
                    showToast(`🔄 已同步: ${date.toLocaleTimeString()}`);
                }
            } catch (error) {
                console.log('⚠️ GitHub 加载失败，使用本地数据:', error);
                const cached = localStorage.getItem('kanban-tasks-cache');
                if (cached) {
                    tasks = JSON.parse(cached);
                    renderBoard();
                }
            }
        }

        // 渲染看板
        function renderBoard() {
            const columns = {
                todo: document.getElementById('todo-list'),
                progress: document.getElementById('progress-list'),
                done: document.getElementById('done-list'),
                archive: document.getElementById('archive-list')
            };

            Object.keys(columns).forEach(status => {
                columns[status].innerHTML = '';
            });

            const counts = { todo: 0, progress: 0, done: 0, archive: 0 };

            tasks.forEach(task => {
                counts[task.status]++;
                const taskCard = createTaskCard(task);
                columns[task.status].appendChild(taskCard);
            });

            Object.keys(counts).forEach(status => {
                const column = document.querySelector(`[data-status="${status}"]`);
                column.querySelector('.column-count').textContent = counts[status];
                
                if (counts[status] === 0) {
                    columns[status].innerHTML = getEmptyState(status);
                }
            });
        }

        // 创建任务卡片
        function createTaskCard(task) {
            const card = document.createElement('div');
            card.className = `task-card ${task.priority}-priority`;
            card.draggable = true;
            card.dataset.taskId = task.id;

            const tagsHtml = task.tags.map(tag => `<span class="tag tag-${tag}">${getTagLabel(tag)}</span>`).join('');

            card.innerHTML = `
                <div class="task-title">${escapeHtml(task.title)}</div>
                ${task.desc ? `<div class="task-desc">${escapeHtml(task.desc)}</div>` : ''}
                <div class="task-meta">
                    <div class="task-tags">${tagsHtml}</div>
                    <div class="task-actions">
                        <button class="task-btn" onclick="editTask('${task.id}')">✏️</button>
                        <button class="task-btn" onclick="deleteTask('${task.id}')">🗑️</button>
                    </div>
                </div>
            `;

            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', task.id);
                card.classList.add('dragging');
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
            });

            return card;
        }

        // 获取空状态HTML
        function getEmptyState(status) {
            const states = {
                todo: { icon: '📭', text: '暂无任务' },
                progress: { icon: '🎯', text: '暂无进行中的任务' },
                done: { icon: '🎉', text: '还没有完成的任务' },
                archive: { icon: '📚', text: '暂无归档' }
            };
            const state = states[status];
            return `
                <div class="empty-state">
                    <div class="empty-state-icon">${state.icon}</div>
                    <p>${state.text}</p>
                </div>
            `;
        }

        // 设置拖放
        function setupDragAndDrop() {
            const columns = document.querySelectorAll('.column');

            columns.forEach(column => {
                const taskList = column.querySelector('.task-list');

                taskList.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    column.classList.add('drag-over');
                });

                taskList.addEventListener('dragleave', () => {
                    column.classList.remove('drag-over');
                });

                taskList.addEventListener('drop', (e) => {
                    e.preventDefault();
                    column.classList.remove('drag-over');

                    const taskId = e.dataTransfer.getData('text/plain');
                    const newStatus = column.dataset.status;

                    const task = tasks.find(t => t.id === taskId);
                    if (task && task.status !== newStatus) {
                        task.status = newStatus;
                        renderBoard();
                        showToast(`任务移动到: ${getStatusLabel(newStatus)}`);
                    }
                });
            });
        }

        // 打开模态框
        function openModal(status, taskId = null) {
            editingTaskId = taskId;
            document.getElementById('taskStatus').value = status;
            document.getElementById('modalTitle').textContent = taskId ? '编辑任务' : '添加任务';

            if (taskId) {
                const task = tasks.find(t => t.id === taskId);
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDesc').value = task.desc || '';
                document.getElementById('taskPriority').value = task.priority;
                document.getElementById('taskTags').value = task.tags.join(',');
                selectPriority(task.priority);
                document.querySelectorAll('.tag-option').forEach(el => {
                    el.classList.toggle('selected', task.tags.includes(el.dataset.tag));
                });
            } else {
                document.getElementById('taskForm').reset();
                document.getElementById('taskId').value = '';
                document.getElementById('taskTags').value = '';
                selectPriority('medium');
                document.querySelectorAll('.tag-option').forEach(el => el.classList.remove('selected'));
            }

            document.getElementById('taskModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
            editingTaskId = null;
        }

        // 选择优先级
        function selectPriority(priority) {
            document.querySelectorAll('.priority-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.priority === priority);
            });
            document.getElementById('taskPriority').value = priority;
        }

        // 切换标签
        function toggleTag(tag) {
            const tagElement = document.querySelector(`[data-tag="${tag}"]`);
            tagElement.classList.toggle('selected');
            const selectedTags = Array.from(document.querySelectorAll('.tag-option.selected'))
                .map(el => el.dataset.tag);
            document.getElementById('taskTags').value = selectedTags.join(',');
        }

        // 表单提交 - 自动推送到GitHub
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('taskTitle').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const priority = document.getElementById('taskPriority').value;
            const tagsStr = document.getElementById('taskTags').value;
            const tags = tagsStr ? tagsStr.split(',').filter(t => t) : [];
            const status = document.getElementById('taskStatus').value;

            if (editingTaskId) {
                const task = tasks.find(t => t.id === editingTaskId);
                task.title = title;
                task.desc = desc;
                task.priority = priority;
                task.tags = tags;
                task.updatedAt = new Date().toISOString();
            } else {
                const newTask = {
                    id: 'task_' + Date.now(),
                    title,
                    desc,
                    priority,
                    tags,
                    status,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                tasks.push(newTask);
            }

            renderBoard();
            closeModal();
            
            // 自动推送到GitHub
            showToast('💾 正在保存到云端...');
            const success = await pushToGitHub();
            if (success) {
                showToast(editingTaskId ? '✅ 任务已更新并同步' : '✅ 任务已创建并同步');
            }
        });

        // 编辑任务
        function editTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                openModal(task.status, taskId);
            }
        }

        // 删除任务 - 自动推送到GitHub
        async function deleteTask(taskId) {
            if (confirm('确定要删除这个任务吗？')) {
                tasks = tasks.filter(t => t.id !== taskId);
                renderBoard();
                showToast('🗑️ 正在删除...');
                const success = await pushToGitHub();
                if (success) {
                    showToast('✅ 任务已删除并同步');
                }
            }
        }

        // GitHub Token（请在此处填入你的 GitHub Token）
        // 获取方式：GitHub Settings -> Developer settings -> Personal access tokens -> Tokens (classic)
        // 权限需要勾选：repo
        let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
        const REPO = 'PAPADING9618/PAPA-Brain';
        const FILE_PATH = 'data.json';
        
        // 页面加载时检查 Token
        window.addEventListener('load', () => {
            if (!GITHUB_TOKEN) {
                setTimeout(() => {
                    const token = prompt('🔑 首次使用需要配置 GitHub Token 才能自动同步\n\n获取方式：\n1. 打开 GitHub → Settings → Developer settings\n2. Personal access tokens → Tokens (classic)\n3. Generate new token (classic)\n4. 勾选 repo 权限\n5. 复制 Token 粘贴到这里：\n\n（或者点击取消，使用导出功能手动保存）');
                    if (token) {
                        localStorage.setItem('github_token', token);
                        GITHUB_TOKEN = token;
                        showToast('✅ Token 已配置，现在可以自动同步了！');
                    }
                }, 1000);
            }
        });
        
        // 检查是否有Token
        function checkGitHubToken() {
            GITHUB_TOKEN = localStorage.getItem('github_token') || '';
            if (!GITHUB_TOKEN) {
                showToast('⚠️ 请先配置 GitHub Token');
                setTimeout(() => {
                    const token = prompt('配置 GitHub Token 才能自动同步：');
                    if (token) {
                        localStorage.setItem('github_token', token);
                        GITHUB_TOKEN = token;
                        showToast('✅ Token 已配置，请重新操作');
                    }
                }, 500);
                return false;
            }
            return true;
        }

        // 推送到GitHub（带冲突检测）
        async function pushToGitHub() {
            if (!checkGitHubToken()) return false;
            
            try {
                // 1. 先获取远程最新版本
                const getResponse = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!getResponse.ok) {
                    if (getResponse.status === 401) {
                        alert('GitHub Token 无效或已过期，请重新配置');
                        localStorage.removeItem('github_token');
                        location.reload();
                        return false;
                    }
                    throw new Error('获取远程数据失败');
                }
                
                const remoteData = await getResponse.json();
                const remoteSha = remoteData.sha;
                const remoteContent = JSON.parse(atob(remoteData.content));
                
                // 2. 检查冲突：对比远程tasks和本地加载时的tasks
                const cachedTasksStr = localStorage.getItem('kanban-tasks-cache');
                const cachedTasks = cachedTasksStr ? JSON.parse(cachedTasksStr) : [];
                
                // 简单冲突检测：如果远程tasks数量或ID不同，认为有更新
                const remoteTaskIds = (remoteContent.tasks || []).map(t => t.id).sort().join(',');
                const cachedTaskIds = cachedTasks.map(t => t.id).sort().join(',');
                
                if (remoteTaskIds !== cachedTaskIds) {
                    // 有冲突，提示用户刷新
                    showToast('⚠️ 检测到云端有更新，请刷新页面');
                    if (confirm('云端数据已更新，是否立即刷新查看？\n（取消则保留本地修改）')) {
                        location.reload();
                    }
                    return false;
                }
                
                // 3. 合并数据：保留其他字段，只更新tasks
                const newData = {
                    ...remoteContent,
                    tasks: tasks,
                    lastUpdated: new Date().toISOString()
                };
                
                // 4. 推送到GitHub
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2))));
                
                const putResponse = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `更新任务看板 (${new Date().toLocaleString('zh-CN')})`,
                        content: content,
                        sha: remoteSha
                    })
                });
                
                if (putResponse.ok) {
                    // 更新本地缓存
                    localStorage.setItem('kanban-tasks-cache', JSON.stringify(tasks));
                    localStorage.setItem('kanban-last-sync', new Date().toISOString());
                    return true;
                } else {
                    const error = await putResponse.json();
                    throw new Error(error.message || '推送失败');
                }
                
            } catch (error) {
                console.error('推送失败:', error);
                showToast('❌ 同步失败: ' + error.message);
                // 提示导出
                setTimeout(() => {
                    if (confirm('自动同步失败，是否导出数据手动保存？')) {
                        exportData();
                    }
                }, 500);
                return false;
            }
        }

        // 获取状态标签
        function getStatusLabel(status) {
            const labels = {
                todo: '待办事项',
                progress: '进行中',
                done: '已完成',
                archive: '已归档'
            };
            return labels[status] || status;
        }

        // 获取标签文字（映射到四大标签）
        function getTagLabel(tag) {
            const labels = {
                'work': '💼 工作',
                '工作': '💼 工作',
                '个人': '🏠 个人',
                'side': '🏠 个人',
                'hobby': '🏠 个人',
                'wedding': '🏠 个人',
                'xiaopa': '🏠 个人',
                '学习': '📚 学习',
                'growth': '📚 学习',
                'health': '💪 健康'
            };
            return labels[tag] || tag;
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 导出数据（备用）
        function exportData() {
            const data = {
                tasks: tasks,
                lastModified: new Date().toISOString()
            };
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'kanban-data-' + new Date().toISOString().split('T')[0] + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📥 数据已导出');
        }

        // 快捷键导出
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                exportData();
            }
        });

        // 点击遮罩关闭
        document.getElementById('taskModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        });

        // ESC键关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await loadFromGitHub();
            renderBoard();
            setupDragAndDrop();
        });
    </script>
</body>
</html>
