<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 验证中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .lock-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            letter-spacing: 4px;
        }

        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: normal;
        }

        input[type="password"]:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .error-message.show {
            opacity: 1;
        }

        .hint {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        /* 成功动画 */
        .success-check {
            display: none;
            font-size: 4rem;
            margin-bottom: 20px;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div id="loginForm">
            <div class="lock-icon">🔐</div>
            <h1>papa酱的工作台</h1>
            <p class="subtitle">请输入访问密码</p>

            <div class="input-group">
                <input type="password" id="password" placeholder="••••••" maxlength="20" autocomplete="off">
            </div>

            <button class="btn-login" onclick="verifyPassword()">进入</button>

            <p class="error-message" id="errorMsg">密码错误，请重试</p>
        </div>

        <div id="successView" class="hidden">
            <div class="success-check">✅</div>
            <h1>验证成功</h1㸂
            <p class="subtitle">正在进入工作台...</p>
        </div>
    </div>

    <script>
        // 密码配置（你可以修改这里）
        const CORRECT_PASSWORD = 'papa2026';
        
        // 检查是否已登录
        if (sessionStorage.getItem('papaBrainAuth') === 'true') {
            window.location.href = 'home.html';
        }

        // 回车键提交
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyPassword();
            }
        });

        function verifyPassword() {
            const input = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');
            const loginForm = document.getElementById('loginForm');
            const successView = document.getElementById('successView');

            if (input.value === CORRECT_PASSWORD) {
                // 登录成功
                sessionStorage.setItem('papaBrainAuth', 'true');
                
                loginForm.classList.add('hidden');
                successView.classList.remove('hidden');
                successView.querySelector('.success-check').style.display = 'block';

                // 2秒后跳转
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1500);
            } else {
                // 密码错误
                errorMsg.classList.add('show');
                input.value = '';
                input.focus();
                
                // 震动效果
                input.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    input.style.animation = '';
                }, 500);
            }
        }

        // 添加震动动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
