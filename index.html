<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>papa酱工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .section {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #334155;
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .task-item {
            background: #334155;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .task-item.done { opacity: 0.5; }
        .task-item.done .task-title { text-decoration: line-through; }
        .tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .tag-work { background: #3b82f6; }
        .tag-side { background: #8b5cf6; }
        .tag-personal { background: #10b981; }
        .tag-study { background: #f59e0b; }
        .project-card {
            background: #334155;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .progress-bar {
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
        }
        .kb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .kb-item {
            background: #334155;
            padding: 24px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
        }
        .kb-icon { font-size: 2rem; margin-bottom: 8px; }
        .kb-count { color: #94a3b8; font-size: 0.9rem; margin-top: 4px; }
        .cron-item {
            background: #334155;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cron-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .status-active { background: #10b981; }
        .status-disabled { background: #64748b; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>papa酱的工作台</h1>
        <p>任务管理 / 项目追踪 / 知识库</p>
    </div>

    <div class="container">
        <div class="section">
            <h2>今日任务</h2>
            <div id="tasks">加载中...</div>
        </div>

        <div class="section">
            <h2>项目追踪</h2>
            <div id="projects">加载中...</div>
        </div>

        <div class="section">
            <h2>知识库</h2>
            <div id="knowledge">加载中...</div>
        </div>

        <div class="section">
            <h2>自动化任务</h2>
            <div id="cron">加载中...</div>
        </div>
    </div>

    <script>
        async function init() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();

                renderTasks(data.tasks || []);
                renderProjects(data.projects || []);
                renderKnowledge(data.knowledge || [], data.notes || []);
                renderCron(data.automationTasks || []);
            } catch (err) {
                document.body.innerHTML = '<div style="padding:40px;text-align:center;">加载失败，请检查 data.json 是否存在</div>';
            }
        }

        function renderTasks(tasks) {
            const tagColors = { '工作': 'tag-work', '副业': 'tag-side', '个人': 'tag-personal', '学习': 'tag-study' };
            document.getElementById('tasks').innerHTML = tasks.map(t => `
                <div class="task-item ${t.status}">
                    <span class="tag ${tagColors[t.tags?.[0]] || 'tag-work'}">${t.tags?.[0] || '其他'}</span>
                    <div style="flex:1">
                        <div class="task-title">${t.title}</div>
                        <div style="color:#94a3b8;font-size:0.9rem">${t.desc || ''}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderProjects(projects) {
            document.getElementById('projects').innerHTML = projects.map(p => `
                <div class="project-card">
                    <div class="project-header">
                        <strong>${p.name}</strong>
                        <span style="color:#94a3b8">${p.progress}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${p.progress}%"></div>
                    </div>
                    <div style="color:#94a3b8;font-size:0.9rem;margin-top:8px">${p.description}</div>
                </div>
            `).join('');
        }

        function renderKnowledge(kb, notes) {
            kb.forEach(k => k.count = notes.filter(n => n.category === k.category).length);
            document.getElementById('knowledge').innerHTML = `
                <div class="kb-grid">
                    ${kb.map(k => `
                        <div class="kb-item">
                            <div class="kb-icon">${k.icon}</div>
                            <div>${k.title}</div>
                            <div class="kb-count">${k.count} 条笔记</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderCron(tasks) {
            document.getElementById('cron').innerHTML = tasks.map(t => `
                <div class="cron-item">
                    <div>
                        <div style="font-weight:500">${t.name}</div>
                        <div style="color:#94a3b8;font-size:0.9rem">${t.schedule} · ${t.channel}</div>
                    </div>
                    <span class="cron-status status-${t.status}">${t.status === 'active' ? '运行中' : '已禁用'}</span>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
